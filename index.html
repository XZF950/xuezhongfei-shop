<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>雪中飞门店健康诊断系统</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; color: #333; line-height: 1.6; }
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 22px; margin-bottom: 4px; }
.header p { opacity: 0.9; font-size: 12px; }
.stats-bar { display: flex; justify-content: center; gap: 15px; padding: 15px; background: white; border-bottom: 1px solid #e8e8e8; flex-wrap: wrap; }
.stat-item { text-align: center; flex: 1; min-width: 80px; }
.stat-num { font-size: 24px; font-weight: bold; }
.stat-label { font-size: 11px; color: #999; margin-top: 2px; }
.stat-red { color: #ff4d4f; }
.stat-yellow { color: #faad14; }
.stat-green { color: #52c41a; }
.stat-blue { color: #1890ff; }

/* Tab导航 */
.tab-nav { display: flex; background: white; border-bottom: 1px solid #e8e8e8; position: sticky; top: 68px; z-index: 99; }
.tab-btn { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent; transition: all 0.3s; }
.tab-btn.active { border-bottom-color: #667eea; color: #667eea; font-weight: bold; }
.tab-btn:hover { background: #f5f7fa; }

/* 内容区域 */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* 上传区域 */
.upload-area { background: white; margin: 15px; padding: 20px; border-radius: 10px; border: 2px dashed #d9d9d9; text-align: center; }
.upload-area.dragover { border-color: #667eea; background: #f0f5ff; }
.upload-area h3 { font-size: 16px; color: #666; margin-bottom: 10px; }
.upload-area p { font-size: 12px; color: #999; margin-bottom: 15px; }
.file-input { display: none; }
.upload-btn { padding: 10px 24px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
.upload-btn:hover { background: #5a6fd6; }
.file-list { margin-top: 15px; text-align: left; }
.file-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #f8f9fa; border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
.file-item .remove { color: #ff4d4f; cursor: pointer; font-size: 16px; }

/* 筛选区域 */
.filters { padding: 12px 15px; background: white; border-bottom: 1px solid #e8e8e8; }
.filter-row { display: flex; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.filter-row:last-child { margin-bottom: 0; }
.filter-row select, .filter-row input { flex: 1; padding: 8px 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; background: white; min-width: 120px; }
.filter-row button { padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; white-space: nowrap; }
.filter-row button.secondary { background: #f0f0f0; color: #666; }

/* 店铺卡片 */
.shop-card { background: white; border-radius: 10px; margin: 10px 15px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.shop-header { padding: 14px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-left: 3px solid; }
.shop-header.red { border-left-color: #ff4d4f; background: #fff2f0; }
.shop-header.yellow { border-left-color: #faad14; background: #fffbe6; }
.shop-header.green { border-left-color: #52c41a; background: #f6ffed; }
.shop-name { font-size: 15px; font-weight: bold; color: #333; }
.shop-meta { font-size: 11px; color: #999; margin-left: 6px; }
.shop-meta span { background: #f0f0f0; padding: 1px 6px; border-radius: 3px; margin-left: 4px; }
.shop-status { font-size: 13px; font-weight: bold; }
.shop-body { padding: 15px; display: none; }
.shop-body.active { display: block; }

/* 指标网格 */
.metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
.metric-box { background: #f8f9fa; padding: 12px 8px; border-radius: 8px; text-align: center; }
.metric-value { font-size: 18px; font-weight: bold; color: #333; }
.metric-value.good { color: #52c41a; }
.metric-value.warn { color: #faad14; }
.metric-value.bad { color: #ff4d4f; }
.metric-label { font-size: 11px; color: #999; margin-top: 4px; }
.metric-compare { font-size: 10px; margin-top: 3px; }
.compare-better { color: #52c41a; }
.compare-worse { color: #ff4d4f; }

/* 建议框 */
.advice-box { background: #e6f7ff; border: 1px solid #91d5ff; border-radius: 8px; padding: 12px; margin-top: 12px; }
.advice-title { font-weight: bold; color: #1890ff; margin-bottom: 10px; font-size: 13px; }
.advice-list { list-style: none; }
.advice-list li { padding: 5px 0; font-size: 12px; color: #555; border-bottom: 1px dashed #e8e8e8; }
.advice-list li:last-child { border-bottom: none; }
.advice-list li::before { content: "▸ "; color: #1890ff; font-weight: bold; }

/* 数据表格 */
.data-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 12px; }
.data-table th { background: #fafafa; padding: 8px 6px; text-align: left; font-weight: 600; color: #666; border-bottom: 2px solid #e8e8e8; }
.data-table td { padding: 8px 6px; border-bottom: 1px solid #f0f0f0; }

/* 畅销滞销 */
.rank-list { display: flex; flex-direction: column; gap: 8px; }
.rank-item { display: flex; align-items: center; padding: 10px; background: #f8f9fa; border-radius: 8px; }
.rank-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; color: white; margin-right: 12px; flex-shrink: 0; }
.rank-num.hot { background: #ff4d4f; }
.rank-num.warm { background: #faad14; }
.rank-num.cool { background: #52c41a; }
.rank-info { flex: 1; }
.rank-name { font-size: 13px; font-weight: bold; color: #333; }
.rank-detail { font-size: 11px; color: #999; margin-top: 2px; }
.rank-value { font-size: 14px; font-weight: bold; color: #667eea; }

/* 调拨建议 */
.transfer-card { background: #fff7e6; border: 1px solid #ffd591; border-radius: 8px; padding: 12px; margin: 8px 0; }
.transfer-title { font-weight: bold; color: #fa8c16; font-size: 13px; margin-bottom: 8px; }
.transfer-detail { font-size: 12px; color: #666; line-height: 1.8; }
.transfer-detail strong { color: #333; }

/* 加载和错误 */
.loading { text-align: center; padding: 60px; color: #999; }
.error { text-align: center; padding: 40px; color: #ff4d4f; background: #fff2f0; border-radius: 8px; margin: 15px; }
.empty { text-align: center; padding: 60px; color: #999; }

/* 切换图标 */
.toggle-icon { font-size: 11px; transition: transform 0.3s; }
.toggle-icon.rotated { transform: rotate(180deg); }

/* 响应式 */
@media (min-width: 768px) {
    .metrics-grid { grid-template-columns: repeat(6, 1fr); }
    .header h1 { font-size: 26px; }
    .shop-name { font-size: 16px; }
    .stats-bar { gap: 30px; }
    .stat-num { font-size: 32px; }
}

/* 月份选择器 */
.month-selector { display: flex; gap: 8px; overflow-x: auto; padding: 10px 15px; background: white; border-bottom: 1px solid #e8e8e8; scrollbar-width: none; }
.month-selector::-webkit-scrollbar { display: none; }
.month-chip { padding: 6px 14px; border-radius: 16px; background: #f0f0f0; color: #666; font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.3s; }
.month-chip.active { background: #667eea; color: white; }
.month-chip:hover { background: #e0e0e0; }
.month-chip.active:hover { background: #5a6fd6; }

/* 日期范围选择 */
.date-range { display: flex; align-items: center; gap: 8px; padding: 10px 15px; background: white; }
.date-range input { padding: 8px 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; }
.date-range span { color: #999; font-size: 13px; }

/* ABC标签 */
.abc-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 6px; }
.abc-a { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
.abc-b { background: #fffbe6; color: #faad14; border: 1px solid #ffe58f; }
.abc-c { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
</style>
</head>
<body>
<div class="header">
    <h1>🏪 雪中飞门店健康诊断系统</h1>
    <p id="updateTime">请先上传数据文件</p>
</div>

<!-- Tab导航 -->
<div class="tab-nav">
    <div class="tab-btn active" onclick="switchTab('summary')">📊 月度汇总诊断</div>
    <div class="tab-btn" onclick="switchTab('retail')">📈 零售明细分析</div>
</div>

<!-- Tab 1: 月度汇总诊断 -->
<div id="tab-summary" class="tab-content active">
    <!-- 上传区域 -->
    <div class="upload-area" id="uploadArea1">
        <h3>📁 上传月度汇总数据</h3>
        <p>支持 .xlsx / .xls 格式，表头需包含：年份月份、店铺名称、净销量、净销售额、调入、调出、期末库存、期初、售罄率、库销比</p>
        <input type="file" id="fileInput1" class="file-input" accept=".xlsx,.xls" multiple onchange="handleFile1(this)">
        <button class="upload-btn" onclick="document.getElementById('fileInput1').click()">选择文件</button>
        <div class="file-list" id="fileList1"></div>
    </div>

    <!-- ABC分类上传 -->
    <div class="upload-area" id="uploadAreaABC" style="margin-top: 10px;">
        <h3>🏷️ 上传店铺ABC分类（可选）</h3>
        <p>表头：店铺名称、ABC级分类。不上传则按销售额自动分级</p>
        <input type="file" id="fileInputABC" class="file-input" accept=".xlsx,.xls,.csv" onchange="handleABCFile(this)">
        <button class="upload-btn secondary" onclick="document.getElementById('fileInputABC').click()">选择文件</button>
        <div class="file-list" id="fileListABC"></div>
    </div>

    <!-- 月份选择 -->
    <div class="month-selector" id="monthSelector" style="display:none;"></div>

    <!-- 筛选 -->
    <div class="filters" id="filters1" style="display:none;">
        <div class="filter-row">
            <select id="abcFilter" onchange="filterSummary()">
                <option value="all">全部ABC级</option>
                <option value="A">A级店铺</option>
                <option value="B">B级店铺</option>
                <option value="C">C级店铺</option>
            </select>
            <select id="statusFilter1" onchange="filterSummary()">
                <option value="all">全部状态</option>
                <option value="red">🔴 红灯</option>
                <option value="yellow">🟡 黄灯</option>
                <option value="green">🟢 绿灯</option>
            </select>
            <input type="text" id="searchBox1" placeholder="🔍 搜索店铺..." onkeyup="filterSummary()">
        </div>
        <div class="filter-row">
            <button onclick="expandAllSummary()">展开全部</button>
            <button onclick="collapseAllSummary()">收起全部</button>
            <button class="secondary" onclick="exportSummary()">📥 导出</button>
        </div>
    </div>

    <!-- 统计栏 -->
    <div class="stats-bar" id="statsBar1" style="display:none;">
        <div class="stat-item"><div class="stat-num stat-red" id="redCount1">0</div><div class="stat-label">🔴 红灯</div></div>
        <div class="stat-item"><div class="stat-num stat-yellow" id="yellowCount1">0</div><div class="stat-label">🟡 黄灯</div></div>
        <div class="stat-item"><div class="stat-num stat-green" id="greenCount1">0</div><div class="stat-label">🟢 绿灯</div></div>
        <div class="stat-item"><div class="stat-num stat-blue" id="totalCount1">0</div><div class="stat-label">总店铺</div></div>
    </div>

    <!-- 店铺列表 -->
    <div id="summaryContainer"></div>
</div>

<!-- Tab 2: 零售明细分析 -->
<div id="tab-retail" class="tab-content">
    <div class="upload-area" id="uploadArea2">
        <h3>📁 上传零售明细数据</h3>
        <p>支持 .xlsx / .xls 格式，表头需包含：单据日期、店铺名称、商品款号、商品名称、颜色、尺码、数量、金额</p>
        <input type="file" id="fileInput2" class="file-input" accept=".xlsx,.xls" multiple onchange="handleFile2(this)">
        <button class="upload-btn" onclick="document.getElementById('fileInput2').click()">选择文件</button>
        <div class="file-list" id="fileList2"></div>
    </div>

    <!-- 日期范围 -->
    <div class="date-range" id="dateRange" style="display:none;">
        <input type="date" id="startDate" onchange="filterRetail()">
        <span>至</span>
        <input type="date" id="endDate" onchange="filterRetail()">
        <button onclick="setQuickRange('today')">今日</button>
        <button onclick="setQuickRange('week')">本周</button>
        <button onclick="setQuickRange('month')">本月</button>
        <button onclick="setQuickRange('year')">本年</button>
    </div>

    <div id="retailContainer"></div>
</div>

<script>
// ==================== 全局数据存储 ====================
let summaryData = null;      // 汇总数据
let abcData = null;          // ABC分类
let retailData = null;       // 零售明细
let currentMonth = null;     // 当前选中月份

// ==================== Tab切换 ====================
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

    if (tab === 'summary') {
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        document.getElementById('tab-summary').classList.add('active');
    } else {
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        document.getElementById('tab-retail').classList.add('active');
    }
}

// ==================== 文件处理 ====================
function handleFile1(input) {
    const files = Array.from(input.files);
    const list = document.getElementById('fileList1');
    list.innerHTML = '';

    files.forEach(file => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = '<span>' + file.name + ' (' + (file.size/1024).toFixed(1) + 'KB)</span><span class="remove" onclick="this.parentElement.remove()">×</span>';
        list.appendChild(item);
    });

    if (files.length > 0) {
        processSummaryFiles(files);
    }
}

function handleABCFile(input) {
    const file = input.files[0];
    if (!file) return;

    const list = document.getElementById('fileListABC');
    list.innerHTML = '<div class="file-item"><span>' + file.name + '</span><span class="remove" onclick="this.parentElement.remove(); abcData=null;">×</span></div>';

    const reader = new FileReader();
    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);

        abcData = {};
        json.forEach(row => {
            const shop = row['店铺名称'] || row['店铺'] || row['门店名称'];
            const level = row['ABC级分类'] || row['ABC'] || row['分类'];
            if (shop && level) {
                abcData[shop] = level.toUpperCase();
            }
        });

        alert('ABC分类已上传：' + Object.keys(abcData).length + '家店铺');

        // 如果已有汇总数据，重新处理
        if (summaryData) {
            processSummaryData();
        }
    };
    reader.readAsArrayBuffer(file);
}

function handleFile2(input) {
    const files = Array.from(input.files);
    const list = document.getElementById('fileList2');
    list.innerHTML = '';

    files.forEach(file => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = '<span>' + file.name + ' (' + (file.size/1024).toFixed(1) + 'KB)</span><span class="remove" onclick="this.parentElement.remove()">×</span>';
        list.appendChild(item);
    });

    if (files.length > 0) {
        processRetailFiles(files);
    }
}

// ==================== 汇总数据处理 ====================
function processSummaryFiles(files) {
    let allData = [];
    let processed = 0;

    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);

            // 标准化列名
            json.forEach(row => {
                const newRow = {};
                Object.keys(row).forEach(key => {
                    const k = key.trim();
                    if (k.includes('年份') || k.includes('月份') || k.includes('日期')) newRow['年份月份'] = row[key];
                    else if (k.includes('店铺') || k.includes('门店')) newRow['店铺名称'] = row[key];
                    else if (k.includes('净销量') || k.includes('销量')) newRow['净销量'] = parseFloat(row[key]) || 0;
                    else if (k.includes('净销售额') || k.includes('销售额')) newRow['净销售额'] = parseFloat(row[key]) || 0;
                    else if (k.includes('调入')) newRow['调入'] = parseFloat(row[key]) || 0;
                    else if (k.includes('调出')) newRow['调出'] = parseFloat(row[key]) || 0;
                    else if (k.includes('期末库存') || k.includes('期末')) newRow['期末库存'] = parseFloat(row[key]) || 0;
                    else if (k.includes('期初')) newRow['期初'] = parseFloat(row[key]) || 0;
                    else if (k.includes('售罄率')) newRow['售罄率'] = parseFloat(row[key]) || 0;
                    else if (k.includes('库销比')) newRow['库销比'] = parseFloat(row[key]) || 0;
                });
                allData.push(newRow);
            });

            processed++;
            if (processed === files.length) {
                summaryData = allData;
                processSummaryData();
            }
        };
        reader.readAsArrayBuffer(file);
    });
}

function processSummaryData() {
    if (!summaryData || summaryData.length === 0) return;

    // 提取月份列表
    const months = [...new Set(summaryData.map(d => d['年份月份']))].filter(m => m).sort();

    // 如果没有ABC分类，按销售额自动分级
    if (!abcData) {
        const shopRevenue = {};
        summaryData.forEach(d => {
            const shop = d['店铺名称'];
            if (!shopRevenue[shop]) shopRevenue[shop] = 0;
            shopRevenue[shop] += d['净销售额'] || 0;
        });

        const sorted = Object.entries(shopRevenue).sort((a, b) => b[1] - a[1]);
        const n = sorted.length;
        abcData = {};
        sorted.forEach(([shop, rev], i) => {
            if (i < n * 0.2) abcData[shop] = 'A';
            else if (i < n * 0.6) abcData[shop] = 'B';
            else abcData[shop] = 'C';
        });
    }

    // 添加ABC分类到数据
    summaryData.forEach(d => {
        d['ABC级分类'] = abcData[d['店铺名称']] || 'C';
    });

    // 生成月份选择器
    const monthSelector = document.getElementById('monthSelector');
    monthSelector.innerHTML = '';
    monthSelector.style.display = 'flex';

    months.forEach(m => {
        const chip = document.createElement('div');
        chip.className = 'month-chip' + (m === months[months.length-1] ? ' active' : '');
        chip.textContent = m;
        chip.onclick = () => selectMonth(m, chip);
        monthSelector.appendChild(chip);
    });

    // 默认选最新月份
    selectMonth(months[months.length-1], monthSelector.lastChild);

    // 显示筛选和统计
    document.getElementById('filters1').style.display = 'block';
    document.getElementById('statsBar1').style.display = 'flex';
    document.getElementById('uploadArea1').style.display = 'none';
    document.getElementById('uploadAreaABC').style.display = 'none';

    document.getElementById('updateTime').textContent = '数据已加载 | 共' + months.length + '个月份 | ' + Object.keys(abcData).length + '家店铺';
}

function selectMonth(month, chipElement) {
    currentMonth = month;

    // 更新选中样式
    document.querySelectorAll('.month-chip').forEach(c => c.classList.remove('active'));
    if (chipElement) chipElement.classList.add('active');

    // 过滤该月份数据
    const monthData = summaryData.filter(d => d['年份月份'] === month);

    // 按ABC级分组计算诊断
    const diagnosis = [];
    const abcLevels = ['A', 'B', 'C'];

    abcLevels.forEach(level => {
        const levelData = monthData.filter(d => d['ABC级分类'] === level);
        if (levelData.length === 0) return;

        // 计算该级别平均
        const avgSellout = levelData.reduce((sum, d) => sum + (d['正确售罄率'] || d['售罄率'] || 0), 0) / levelData.length * 100;
        const avgKxb = levelData.reduce((sum, d) => sum + (d['库销比'] || 0), 0) / levelData.length;

        levelData.forEach(d => {
            const sellout = (d['正确售罄率'] || d['售罄率'] || 0) * 100;
            const kxb = d['库销比'] || 0;
            const sales = d['净销量'] || 0;

            let status, statusDesc, advice;

            if (sellout < avgSellout * 0.5 && sales > 0) {
                status = 'red'; statusDesc = '售罄率远低于同级平均，需立即干预';
                advice = ['立即排查陈列位置，是否被边缘化', '组织店员培训，强化主推话术', '申请促销资源，做限时折扣引流', '检查竞品动态，是否被截流'];
            } else if (kxb > 10 && d['期末库存'] > 100) {
                status = 'red'; statusDesc = '库存积压严重，需立即清货';
                advice = ['立即发起调拨，向热销店转移库存', '申请特卖/快闪活动，加速出清', '调整陈列，把积压款放到黄金位置', '搭配畅销款做捆绑销售'];
            } else if (sellout < avgSellout * 0.8) {
                status = 'yellow'; statusDesc = '售罄率低于同级平均，需关注';
                advice = ['关注陈列位置，确保主推款在黄金位', '加强店员销售培训，提升转化率', '适当申请促销资源刺激销售'];
            } else if (kxb > 5 && d['期末库存'] > 100) {
                status = 'yellow'; statusDesc = '库存偏高，建议加快周转';
                advice = ['加快库存周转，避免过季积压', '申请调拨到其他门店', '做搭配销售提升连带率'];
            } else {
                status = 'green'; statusDesc = '经营健康，保持当前节奏';
                advice = ['保持当前运营节奏', '关注竞品动态，及时调整策略', '培养店员连带销售能力'];
            }

            diagnosis.push({
                ...d,
                sellout: sellout,
                abc_avg_sellout: avgSellout,
                abc_avg_kxb: avgKxb,
                status: status,
                status_desc: statusDesc,
                advice: advice
            });
        });
    });

    // 排序：红灯在前
    const statusOrder = {red: 0, yellow: 1, green: 2};
    diagnosis.sort((a, b) => statusOrder[a.status] - statusOrder[b.status]);

    // 保存当前月份诊断数据
    window.currentDiagnosis = diagnosis;

    renderSummary(diagnosis);
}

function renderSummary(diagnosis) {
    const container = document.getElementById('summaryContainer');

    // 统计
    const red = diagnosis.filter(d => d.status === 'red').length;
    const yellow = diagnosis.filter(d => d.status === 'yellow').length;
    const green = diagnosis.filter(d => d.status === 'green').length;

    document.getElementById('redCount1').textContent = red;
    document.getElementById('yellowCount1').textContent = yellow;
    document.getElementById('greenCount1').textContent = green;
    document.getElementById('totalCount1').textContent = diagnosis.length;

    // 按状态分组渲染
    const groups = {red: [], yellow: [], green: []};
    diagnosis.forEach(d => groups[d.status].push(d));

    const statusNames = {red: '🔴 红灯', yellow: '🟡 黄灯', green: '🟢 绿灯'};
    const badgeClasses = {red: 'badge-red', yellow: 'badge-yellow', green: 'badge-green'};
    const headerClasses = {red: 'red', yellow: 'yellow', green: 'green'};

    let html = '';
    ['red', 'yellow', 'green'].forEach(status => {
        const shops = groups[status];
        if (shops.length === 0) return;

        html += '<div class="section-title">' + statusNames[status] + ' <span class="badge ' + badgeClasses[status] + '">' + shops.length + '家</span></div>';

        shops.forEach(shop => {
            const selloutClass = shop.sellout >= shop.abc_avg_sellout * 0.8 ? 'good' : (shop.sellout >= shop.abc_avg_sellout * 0.5 ? 'warn' : 'bad');
            const kxbClass = (shop['库销比'] || 0) <= 3 ? 'good' : ((shop['库销比'] || 0) <= 8 ? 'warn' : 'bad');

            html += '<div class="shop-card" data-abc="' + shop['ABC级分类'] + '" data-status="' + shop.status + '" data-name="' + shop['店铺名称'] + '">';
            html += '<div class="shop-header ' + headerClasses[status] + '" onclick="toggleShop(this)">';
            html += '<div><span class="shop-name">' + (shop['店铺名称'] || '').replace(/2024|2025|2026/g, '').replace(/陕西省|甘肃省|宁夏|山西省/g, '').replace(/雪中飞店|雪中飞专卖店|雪中飞专厅/g, '').replace(/店$/, '') + '</span>';
            html += '<span class="shop-meta"><span class="abc-tag abc-' + shop['ABC级分类'].toLowerCase() + '">' + shop['ABC级分类'] + '级</span></span></div>';
            html += '<div><span class="shop-status">' + (status === 'red' ? '🔴' : (status === 'yellow' ? '🟡' : '🟢')) + '</span><span class="toggle-icon">▼</span></div></div>';
            html += '<div class="shop-body">';
            html += '<div class="metrics-grid">';
            html += '<div class="metric-box"><div class="metric-value ' + selloutClass + '">' + shop.sellout.toFixed(1) + '%</div><div class="metric-label">本月售罄率</div><div class="metric-compare ' + (shop.sellout >= shop.abc_avg_sellout ? 'compare-better' : 'compare-worse') + '">同级' + shop.abc_avg_sellout.toFixed(1) + '% ' + (shop.sellout >= shop.abc_avg_sellout ? '▲' : '▼') + '</div></div>';
            html += '<div class="metric-box"><div class="metric-value">' + (shop['净销量'] || 0) + '</div><div class="metric-label">本月销量</div></div>';
            html += '<div class="metric-box"><div class="metric-value">¥' + ((shop['净销售额'] || 0)).toLocaleString() + '</div><div class="metric-label">本月销售额</div></div>';
            html += '<div class="metric-box"><div class="metric-value ' + kxbClass + '">' + (shop['库销比'] || 0).toFixed(2) + '</div><div class="metric-label">库销比</div><div class="metric-compare">库存 ' + (shop['期末库存'] || 0) + '件</div></div>';
            html += '<div class="metric-box"><div class="metric-value">' + (shop['调入'] || 0) + '</div><div class="metric-label">本月调入</div></div>';
            html += '<div class="metric-box"><div class="metric-value">' + (shop['调出'] || 0) + '</div><div class="metric-label">本月调出</div></div>';
            html += '</div>';
            html += '<div class="advice-box"><div class="advice-title">📋 ' + shop.status_desc + '</div><ul class="advice-list">' + shop.advice.map(a => '<li>' + a + '</li>').join('') + '</ul></div>';
            html += '</div></div>';
        });
    });

    container.innerHTML = html || '<div class="empty">该月份暂无数据</div>';
}

function toggleShop(header) {
    const body = header.nextElementSibling;
    const icon = header.querySelector('.toggle-icon');
    body.classList.toggle('active');
    icon.classList.toggle('rotated');
}

function filterSummary() {
    const abc = document.getElementById('abcFilter').value;
    const status = document.getElementById('statusFilter1').value;
    const search = document.getElementById('searchBox1').value.toLowerCase();

    if (!window.currentDiagnosis) return;

    let filtered = window.currentDiagnosis;
    if (abc !== 'all') filtered = filtered.filter(d => d['ABC级分类'] === abc);
    if (status !== 'all') filtered = filtered.filter(d => d.status === status);
    if (search) filtered = filtered.filter(d => (d['店铺名称'] || '').toLowerCase().includes(search));

    renderSummary(filtered);
}

// ==================== 零售明细处理 ====================
function processRetailFiles(files) {
    let allData = [];
    let processed = 0;

    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);

            json.forEach(row => {
                const newRow = {};
                Object.keys(row).forEach(key => {
                    const k = key.trim();
                    if (k.includes('日期')) newRow['日期'] = formatDate(row[key]);
                    else if (k.includes('店铺') || k.includes('门店')) newRow['店铺'] = row[key];
                    else if (k.includes('款号') || k.includes('商品编号')) newRow['款号'] = row[key];
                    else if (k.includes('名称') || k.includes('品名')) newRow['品名'] = row[key];
                    else if (k.includes('颜色') || k.includes('色号')) newRow['颜色'] = row[key];
                    else if (k.includes('尺码')) newRow['尺码'] = row[key];
                    else if (k.includes('数量')) newRow['数量'] = parseInt(row[key]) || 0;
                    else if (k.includes('金额') || k.includes('实收')) newRow['金额'] = parseFloat(row[key]) || 0;
                });
                if (newRow['日期'] && newRow['店铺']) {
                    allData.push(newRow);
                }
            });

            processed++;
            if (processed === files.length) {
                retailData = allData;
                document.getElementById('dateRange').style.display = 'flex';
                document.getElementById('uploadArea2').style.display = 'none';

                // 设置默认日期范围
                const dates = allData.map(d => d['日期']).filter(d => d).sort();
                if (dates.length > 0) {
                    document.getElementById('startDate').value = dates[0];
                    document.getElementById('endDate').value = dates[dates.length - 1];
                }

                filterRetail();
            }
        };
        reader.readAsArrayBuffer(file);
    });
}

function formatDate(val) {
    if (!val) return '';
    if (typeof val === 'number') {
        // Excel日期序列号
        const epoch = new Date(1899, 11, 30);
        const date = new Date(epoch.getTime() + val * 86400000);
        return date.toISOString().split('T')[0];
    }
    if (typeof val === 'string') {
        // 尝试解析各种格式
        const d = new Date(val);
        if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
    }
    return '';
}

function setQuickRange(type) {
    const today = new Date();
    let start, end;

    switch(type) {
        case 'today':
            start = end = today.toISOString().split('T')[0];
            break;
        case 'week':
            const day = today.getDay();
            start = new Date(today - (day === 0 ? 6 : day - 1) * 86400000).toISOString().split('T')[0];
            end = today.toISOString().split('T')[0];
            break;
        case 'month':
            start = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
            end = today.toISOString().split('T')[0];
            break;
        case 'year':
            start = new Date(today.getFullYear(), 0, 1).toISOString().split('T')[0];
            end = today.toISOString().split('T')[0];
            break;
    }

    document.getElementById('startDate').value = start;
    document.getElementById('endDate').value = end;
    filterRetail();
}

function filterRetail() {
    if (!retailData) return;

    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;

    let filtered = retailData;
    if (start) filtered = filtered.filter(d => d['日期'] >= start);
    if (end) filtered = filtered.filter(d => d['日期'] <= end);

    renderRetail(filtered);
}

function renderRetail(data) {
    const container = document.getElementById('retailContainer');

    if (data.length === 0) {
        container.innerHTML = '<div class="empty">该时间段暂无数据</div>';
        return;
    }

    // 按店铺分组统计
    const shopStats = {};
    data.forEach(d => {
        const shop = d['店铺'];
        if (!shopStats[shop]) {
            shopStats[shop] = { total: 0, amount: 0, items: {} };
        }
        shopStats[shop].total += d['数量'] || 0;
        shopStats[shop].amount += d['金额'] || 0;

        const key = (d['款号'] || '') + '|' + (d['品名'] || '');
        if (!shopStats[shop].items[key]) {
            shopStats[shop].items[key] = { name: d['品名'] || d['款号'], code: d['款号'], total: 0, colors: {}, sizes: {} };
        }
        shopStats[shop].items[key].total += d['数量'] || 0;

        const color = d['颜色'] || '未知';
        if (!shopStats[shop].items[key].colors[color]) shopStats[shop].items[key].colors[color] = 0;
        shopStats[shop].items[key].colors[color] += d['数量'] || 0;

        const size = d['尺码'] || '未知';
        if (!shopStats[shop].items[key].sizes[size]) shopStats[shop].items[key].sizes[size] = 0;
        shopStats[shop].items[key].sizes[size] += d['数量'] || 0;
    });

    // 生成调拨建议
    const transferSuggestions = generateTransferSuggestions(shopStats);

    let html = '';

    // 调拨建议区域
    if (transferSuggestions.length > 0) {
        html += '<div class="section-title">🚚 智能调拨建议 <span class="badge badge-yellow">' + transferSuggestions.length + '条</span></div>';
        transferSuggestions.forEach(s => {
            html += '<div class="transfer-card">';
            html += '<div class="transfer-title">' + s.from + ' → ' + s.to + '</div>';
            html += '<div class="transfer-detail">' + s.detail + '</div>';
            html += '</div>';
        });
    }

    // 各店铺详情
    Object.entries(shopStats).forEach(([shop, stats]) => {
        // 排序获取畅销滞销
        const items = Object.values(stats.items).sort((a, b) => b.total - a.total);
        const hot5 = items.slice(0, 5);
        const cold5 = items.slice(-5).reverse();

        html += '<div class="shop-card">';
        html += '<div class="shop-header green" onclick="toggleShop(this)">';
        html += '<div><span class="shop-name">' + shop.replace(/2024|2025|2026/g, '').replace(/陕西省|甘肃省|宁夏|山西省/g, '').replace(/雪中飞店|雪中飞专卖店|雪中飞专厅/g, '').replace(/店$/, '') + '</span>';
        html += '<span class="shop-meta">销量 ' + stats.total + ' | 金额 ¥' + stats.amount.toLocaleString() + '</span></div>';
        html += '<div><span class="toggle-icon">▼</span></div></div>';
        html += '<div class="shop-body">';

        // 畅销TOP5
        html += '<div class="advice-box" style="margin-bottom: 12px;"><div class="advice-title">🔥 畅销TOP5</div><div class="rank-list">';
        hot5.forEach((item, i) => {
            const topColor = Object.entries(item.colors).sort((a, b) => b[1] - a[1])[0];
            const topSize = Object.entries(item.sizes).sort((a, b) => b[1] - a[1])[0];
            html += '<div class="rank-item"><div class="rank-num hot">' + (i + 1) + '</div><div class="rank-info"><div class="rank-name">' + item.name + '</div><div class="rank-detail">销量 ' + item.total + ' | 畅销色: ' + (topColor ? topColor[0] : '-') + ' | 畅销尺码: ' + (topSize ? topSize[0] : '-') + '</div></div><div class="rank-value">' + item.total + '</div></div>';
        });
        html += '</div></div>';

        // 滞销TOP5
        html += '<div class="advice-box" style="background: #fff2f0; border-color: #ffccc7;"><div class="advice-title" style="color: #ff4d4f;">❄️ 滞销TOP5</div><div class="rank-list">';
        cold5.forEach((item, i) => {
            html += '<div class="rank-item"><div class="rank-num cool">' + (i + 1) + '</div><div class="rank-info"><div class="rank-name">' + item.name + '</div><div class="rank-detail">销量 ' + item.total + '</div></div><div class="rank-value">' + item.total + '</div></div>';
        });
        html += '</div></div>';

        html += '</div></div>';
    });

    container.innerHTML = html || '<div class="empty">暂无数据</div>';
}

function generateTransferSuggestions(shopStats) {
    const suggestions = [];
    const shops = Object.entries(shopStats);

    // 找出每个店铺的滞销款和畅销款
    shops.forEach(([fromShop, fromStats]) => {
        const fromItems = Object.values(fromStats.items);
        const coldItems = fromItems.filter(i => i.total <= 2).sort((a, b) => a.total - b.total);

        coldItems.forEach(coldItem => {
            // 找其他店铺是否有畅销
            shops.forEach(([toShop, toStats]) => {
                if (fromShop === toShop) return;

                const toItems = Object.values(toStats.items);
                const hotItem = toItems.find(i => i.code === coldItem.code && i.total >= 10);

                if (hotItem) {
                    suggestions.push({
                        from: fromShop.replace(/2024|2025|2026/g, '').replace(/陕西省|甘肃省|宁夏|山西省/g, '').replace(/雪中飞店|雪中飞专卖店|雪中飞专厅/g, '').replace(/店$/, ''),
                        to: toShop.replace(/2024|2025|2026/g, '').replace(/陕西省|甘肃省|宁夏|山西省/g, '').replace(/雪中飞店|雪中飞专卖店|雪中飞专厅/g, '').replace(/店$/, ''),
                        detail: '<strong>' + coldItem.name + '</strong> 在' + fromShop.replace(/2024|2025|2026/g, '').replace(/陕西省|甘肃省|宁夏|山西省/g, '').replace(/雪中飞店|雪中飞专卖店|雪中飞专厅/g, '').replace(/店$/, '') + '仅售' + coldItem.total + '件，而在' + toShop.replace(/2024|2025|2026/g, '').replace(/陕西省|甘肃省|宁夏|山西省/g, '').replace(/雪中飞店|雪中飞专卖店|雪中飞专厅/g, '').replace(/店$/, '') + '热销' + hotItem.total + '件。建议将该款' + (Object.keys(coldItem.colors)[0] || '') + '色' + (Object.keys(coldItem.sizes)[0] || '') + '码调拨至' + toShop.replace(/2024|2025|2026/g, '').replace(/陕西省|甘肃省|宁夏|山西省/g, '').replace(/雪中飞店|雪中飞专卖店|雪中飞专厅/g, '').replace(/店$/, '') + '。'
                    });
                }
            });
        });
    });

    return suggestions.slice(0, 20); // 最多显示20条
}

// 拖拽上传支持
document.addEventListener('DOMContentLoaded', function() {
    ['uploadArea1', 'uploadArea2', 'uploadAreaABC'].forEach(id => {
        const area = document.getElementById(id);
        if (!area) return;

        area.addEventListener('dragover', e => {
            e.preventDefault();
            area.classList.add('dragover');
        });
        area.addEventListener('dragleave', () => area.classList.remove('dragover'));
        area.addEventListener('drop', e => {
            e.preventDefault();
            area.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (id === 'uploadArea1') {
                document.getElementById('fileInput1').files = files;
                handleFile1(document.getElementById('fileInput1'));
            } else if (id === 'uploadArea2') {
                document.getElementById('fileInput2').files = files;
                handleFile2(document.getElementById('fileInput2'));
            } else if (id === 'uploadAreaABC') {
                document.getElementById('fileInputABC').files = files;
                handleABCFile(document.getElementById('fileInputABC'));
            }
        });
    });
});

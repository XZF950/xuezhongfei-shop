<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零售数据分析诊断系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #0f1117; color: #e2e8f0; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1a1d29; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }

        /* Glassmorphism Cards */
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
        }
        
        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Status Lights */
        .light-green { 
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
        }
        .light-yellow { 
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.4);
        }
        .light-red { 
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
        }

        /* Progress Bar Animation */
        @keyframes progress-fill {
            0% { width: 0%; }
            100% { width: var(--progress-width); }
        }
        .progress-animate {
            animation: progress-fill 0.5s ease-out forwards;
        }

        /* Table Styles */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        .data-table th {
            background: rgba(15, 23, 42, 0.8);
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.875rem;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.875rem;
        }
        .data-table tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        /* Tab Animation */
        .tab-active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        
        /* Hidden Admin Entry */
        .admin-trigger {
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        .admin-trigger:hover {
            opacity: 1;
        }

        /* Rank Badge */
        .rank-badge {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.75rem;
        }
        .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
        .rank-3 { background: linear-gradient(135deg, #b45309, #92400e); color: #fff; }
        .rank-other { background: rgba(255,255,255,0.1); color: #94a3b8; }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Modal */
        .modal-overlay {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
        }

        /* Print Styles for Reports */
        @media print {
            body { background: white; color: black; }
            .no-print { display: none !important; }
            .glass-card { border: 1px solid #ccc; background: white; }
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass-card border-b border-white/5 mx-4 mt-4" style="border-radius: 12px;">
        <div class="px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-white">零售数据分析诊断系统</h1>
                    <p class="text-xs text-gray-400" id="last-updated">上次更新: --</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="switchTab('diagnosis')" id="nav-diagnosis" class="tab-active px-5 py-2 rounded-lg text-sm font-medium transition-all">
                    月度汇总诊断
                </button>
                <button onclick="switchTab('retail')" id="nav-retail" class="px-5 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 transition-all">
                    零售明细分析
                </button>
                <button onclick="switchTab('admin')" id="nav-admin" class="admin-trigger px-4 py-2 rounded-lg text-xs text-gray-500 hover:text-white transition-all" title="数据管理后台">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-8 px-4 max-w-[1600px] mx-auto">

        <!-- ========== SECTION 1: DATA ADMIN (Hidden) ========== -->
        <section id="section-admin" class="hidden space-y-6">
            <div class="glass-card p-6">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
                    </svg>
                    数据管理后台
                </h2>

                <!-- Store Data -->
                <div class="mb-8">
                    <h3 class="text-lg font-semibold mb-4 text-blue-300">店铺基础数据 (ABC分类)</h3>
                    <div class="flex gap-4 mb-4">
                        <label class="flex-1 relative group cursor-pointer">
                            <input type="file" accept=".xlsx,.xls,.csv" onchange="handleFileUpload(event, 'store')" class="hidden">
                            <div class="border-2 border-dashed border-gray-600 rounded-xl p-6 text-center group-hover:border-blue-500 transition-colors">
                                <svg class="w-8 h-8 mx-auto mb-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                                </svg>
                                <span class="text-sm text-gray-400">上传店铺数据 (店铺名称, ABC级分类)</span>
                            </div>
                        </label>
                    </div>
                    <div id="store-uploads" class="space-y-2"></div>
                </div>

                <!-- Monthly Summary Data -->
                <div class="mb-8">
                    <h3 class="text-lg font-semibold mb-4 text-purple-300">月度经营汇总表 (历史对照组)</h3>
                    <div class="flex gap-4 mb-4">
                        <label class="flex-1 relative group cursor-pointer">
                            <input type="file" accept=".xlsx,.xls,.csv" onchange="handleFileUpload(event, 'summary')" class="hidden">
                            <div class="border-2 border-dashed border-gray-600 rounded-xl p-6 text-center group-hover:border-purple-500 transition-colors">
                                <svg class="w-8 h-8 mx-auto mb-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                </svg>
                                <span class="text-sm text-gray-400">上传月度汇总表 (年份月份, 店铺名称, 净销量, 净销售额...)</span>
                            </div>
                        </label>
                    </div>
                    <div id="summary-uploads" class="space-y-2"></div>
                </div>

                <!-- Retail Detail Data -->
                <div class="mb-8">
                    <h3 class="text-lg font-semibold mb-4 text-emerald-300">零售明细数据</h3>
                    <div class="flex gap-4 mb-4">
                        <label class="flex-1 relative group cursor-pointer">
                            <input type="file" accept=".xlsx,.xls,.csv" onchange="handleFileUpload(event, 'retail')" class="hidden">
                            <div class="border-2 border-dashed border-gray-600 rounded-xl p-6 text-center group-hover:border-emerald-500 transition-colors">
                                <svg class="w-8 h-8 mx-auto mb-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                </svg>
                                <span class="text-sm text-gray-400">上传零售明细 (单据编号, 单据日期, 店铺名称, 商品款号...)</span>
                            </div>
                        </label>
                    </div>
                    <div id="retail-uploads" class="space-y-2"></div>
                </div>

                <div class="flex gap-4 mt-6">
                    <button onclick="exportAllReports()" class="px-6 py-3 bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl font-medium hover:opacity-90 transition-opacity flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                        导出所有店铺诊断报告
                    </button>
                    <button onclick="clearAllData()" class="px-6 py-3 bg-red-600/20 text-red-400 border border-red-600/30 rounded-xl font-medium hover:bg-red-600/30 transition-colors">
                        清空所有数据
                    </button>
                </div>
            </div>
        </section>

        <!-- ========== SECTION 2: MONTHLY DIAGNOSIS ========== -->
        <section id="section-diagnosis" class="space-y-6">
            <!-- Filters -->
            <div class="glass-card p-5">
                <div class="flex flex-wrap items-end gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1.5">时间选择</label>
                        <select id="diag-time-filter" onchange="updateDiagnosis()" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm min-w-[160px] focus:outline-none focus:border-blue-500">
                            <option value="">请选择月份</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1.5">店铺选择</label>
                        <select id="diag-store-filter" onchange="updateDiagnosis()" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm min-w-[160px] focus:outline-none focus:border-blue-500">
                            <option value="">全部店铺</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1.5">ABC级别</label>
                        <select id="diag-abc-filter" onchange="updateDiagnosis()" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm min-w-[120px] focus:outline-none focus:border-blue-500">
                            <option value="">全部级别</option>
                            <option value="A">A级</option>
                            <option value="B">B级</option>
                            <option value="C">C级</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1.5">状态筛选</label>
                        <select id="diag-status-filter" onchange="updateDiagnosis()" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm min-w-[120px] focus:outline-none focus:border-blue-500">
                            <option value="">全部状态</option>
                            <option value="green">🟢 绿灯</option>
                            <option value="yellow">🟡 黄灯</option>
                            <option value="red">🔴 红灯</option>
                        </select>
                    </div>
                    <div class="flex-1"></div>
                    <button onclick="generateFullReport()" class="px-5 py-2.5 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-lg text-sm font-medium hover:opacity-90 transition-opacity">
                        生成诊断报告
                    </button>
                </div>
            </div>

            <!-- Diagnosis Cards Grid -->
            <div id="diagnosis-cards" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
                <div class="glass-card p-8 text-center text-gray-500 col-span-full">
                    <svg class="w-16 h-16 mx-auto mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <p>请先导入店铺数据和月度汇总数据</p>
                </div>
            </div>
        </section>

        <!-- ========== SECTION 3: RETAIL ANALYSIS ========== -->
        <section id="section-retail" class="hidden space-y-6">
            <!-- Filters -->
            <div class="glass-card p-5">
                <div class="flex flex-wrap items-end gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1.5">时间范围</label>
                        <input type="date" id="retail-start" onchange="updateRetailAnalysis()" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm">
                        <span class="mx-2 text-gray-500">至</span>
                        <input type="date" id="retail-end" onchange="updateRetailAnalysis()" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1.5">店铺筛选</label>
                        <select id="retail-store-filter" onchange="updateRetailAnalysis()" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm min-w-[160px] focus:outline-none focus:border-emerald-500">
                            <option value="">全部店铺</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1.5">ABC级别</label>
                        <select id="retail-abc-filter" onchange="updateRetailAnalysis()" class="bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm min-w-[120px] focus:outline-none focus:border-emerald-500">
                            <option value="">全部级别</option>
                            <option value="A">A级</option>
                            <option value="B">B级</option>
                            <option value="C">C级</option>
                        </select>
                    </div>
                    <div class="flex-1"></div>
                    <div class="text-right">
                        <p class="text-xs text-gray-500 mb-1">数据条数</p>
                        <p class="text-lg font-bold text-emerald-400" id="retail-count">0</p>
                    </div>
                </div>
            </div>

            <!-- Three-Level Linked Rankings -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Ranking 1: Best Sellers -->
                <div class="glass-card p-5">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
                        畅销款 TOP 10
                    </h3>
                    <div class="overflow-auto max-h-[500px]">
                        <table class="data-table" id="rank-style-table">
                            <thead>
                                <tr>
                                    <th class="w-10">#</th>
                                    <th>商品款号</th>
                                    <th class="text-right">销量</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <!-- Ranking 2: Best Colors -->
                <div class="glass-card p-5">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-blue-400"></span>
                        畅销色 TOP 10
                        <span id="selected-style-label" class="text-xs font-normal text-gray-500 ml-2"></span>
                    </h3>
                    <div class="overflow-auto max-h-[500px]">
                        <table class="data-table" id="rank-color-table">
                            <thead>
                                <tr>
                                    <th class="w-10">#</th>
                                    <th>颜色</th>
                                    <th class="text-right">销量</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <!-- Ranking 3: Best Sizes -->
                <div class="glass-card p-5">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-purple-400"></span>
                        畅销尺码 TOP 10
                        <span id="selected-color-label" class="text-xs font-normal text-gray-500 ml-2"></span>
                    </h3>
                    <div class="overflow-auto max-h-[500px]">
                        <table class="data-table" id="rank-size-table">
                            <thead>
                                <tr>
                                    <th class="w-10">#</th>
                                    <th>尺码</th>
                                    <th class="text-right">销量</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Slow Movers & Transfer Suggestions -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass-card p-5">
                    <h3 class="text-lg font-bold mb-4 text-red-400">滞销款预警 TOP 10</h3>
                    <div class="overflow-auto max-h-[400px]">
                        <table class="data-table" id="slow-style-table">
                            <thead>
                                <tr>
                                    <th>商品款号</th>
                                    <th>店铺</th>
                                    <th class="text-right">库存</th>
                                    <th class="text-right">销量</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
                <div class="glass-card p-5">
                    <h3 class="text-lg font-bold mb-4 text-amber-400">智能调拨建议</h3>
                    <div class="overflow-auto max-h-[400px]" id="transfer-suggestions">
                        <p class="text-gray-500 text-center py-8">基于畅销/滞销数据分析生成调拨建议</p>
                    </div>
                </div>
            </div>

            <!-- Retail Detail Table -->
            <div class="glass-card p-5">
                <h3 class="text-lg font-bold mb-4">零售明细</h3>
                <div class="overflow-auto max-h-[600px]">
                    <table class="data-table" id="retail-detail-table">
                        <thead>
                            <tr>
                                <th>单据日期</th>
                                <th>店铺</th>
                                <th>款号</th>
                                <th>颜色</th>
                                <th>尺码</th>
                                <th class="text-right">数量</th>
                                <th class="text-right">金额</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <!-- Report Modal -->
    <div id="report-modal" class="fixed inset-0 z-[100] hidden">
        <div class="modal-overlay absolute inset-0" onclick="closeReport()"></div>
        <div class="absolute inset-4 md:inset-10 bg-[#0f1117] rounded-2xl border border-white/10 overflow-auto">
            <div class="sticky top-0 bg-[#0f1117]/95 backdrop-blur border-b border-white/5 p-4 flex justify-between items-center no-print">
                <h2 class="text-xl font-bold">诊断报告预览</h2>
                <div class="flex gap-2">
                    <button onclick="printReport()" class="px-4 py-2 bg-blue-600 rounded-lg text-sm">打印/PDF</button>
                    <button onclick="closeReport()" class="px-4 py-2 bg-gray-700 rounded-lg text-sm">关闭</button>
                </div>
            </div>
            <div id="report-content" class="p-8 max-w-4xl mx-auto"></div>
        </div>
    </div>

    <script>
        // ========== DATA STORE ==========
        const DataStore = {
            storeData: [],      // [{name, abc, city}]
            summaryData: [],    // [{yearMonth, storeName, netSales, netAmount, transferIn, transferOut, endStock, beginStock, sellRate, stockRatio}]
            retailData: [],     // [{docNo, date, status, type, store, guide, pay, styleNo, name, colorNo, color, sizeNo, size, qty, price, amount, tagPrice, tagAmount, realPrice, realAmount, category, createTime}]
            uploads: { store: [], summary: [], retail: [] },
            
            save() {
                try {
                    localStorage.setItem('retail_analyzer_data', JSON.stringify({
                        storeData: this.storeData,
                        summaryData: this.summaryData,
                        retailData: this.retailData,
                        uploads: this.uploads
                    }));
                    document.getElementById('last-updated').textContent = '上次更新: ' + new Date().toLocaleString('zh-CN');
                } catch(e) {
                    alert('数据保存失败，可能超出浏览器存储限制。建议定期导出备份。');
                }
            },
            
            load() {
                const saved = localStorage.getItem('retail_analyzer_data');
                if (saved) {
                    const data = JSON.parse(saved);
                    this.storeData = data.storeData || [];
                    this.summaryData = data.summaryData || [];
                    this.retailData = data.retailData || [];
                    this.uploads = data.uploads || { store: [], summary: [], retail: [] };
                    document.getElementById('last-updated').textContent = '上次更新: ' + (data.lastUpdate || '已加载历史数据');
                }
            }
        };

        // ========== FILE UPLOAD WITH PROGRESS ==========
        async function handleFileUpload(event, type) {
            const file = event.target.files[0];
            if (!file) return;
            
            const uploadId = Date.now();
            const progressId = `progress-${uploadId}`;
            
            // Create progress UI
            const container = document.getElementById(`${type}-uploads`);
            const progressHtml = `
                <div id="upload-${uploadId}" class="glass-card p-4 flex items-center gap-4">
                    <div class="flex-1">
                        <div class="flex justify-between mb-1">
                            <span class="text-sm font-medium">${file.name}</span>
                            <span class="text-xs text-gray-400" id="${progressId}-text">0%</span>
                        </div>
                        <div class="w-full bg-gray-700 rounded-full h-2">
                            <div id="${progressId}" class="bg-gradient-to-r from-blue-500 to-purple-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="spinner" id="${progressId}-spinner"></div>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', progressHtml);
            
            try {
                // Simulate progress
                for (let i = 0; i <= 90; i += 10) {
                    await new Promise(r => setTimeout(r, 50));
                    document.getElementById(progressId).style.width = i + '%';
                    document.getElementById(`${progressId}-text`).textContent = i + '%';
                }
                
                const data = await readExcel(file);
                
                // Process data based on type
                if (type === 'store') {
                    processStoreData(data);
                } else if (type === 'summary') {
                    processSummaryData(data, file.name);
                } else if (type === 'retail') {
                    processRetailData(data, file.name);
                }
                
                // Complete
                document.getElementById(progressId).style.width = '100%';
                document.getElementById(`${progressId}-text`).textContent = '完成';
                document.getElementById(`${progressId}-spinner`).style.display = 'none';
                
                // Add delete button
                const uploadEl = document.getElementById(`upload-${uploadId}`);
                uploadEl.innerHTML += `
                    <button onclick="deleteUpload('${type}', ${uploadId})" class="px-3 py-1.5 bg-red-600/20 text-red-400 rounded-lg text-xs hover:bg-red-600/30 transition-colors">
                        删除
                    </button>
                `;
                
                // Save upload record
                DataStore.uploads[type].push({ id: uploadId, name: file.name, date: new Date().toISOString(), count: data.length });
                DataStore.save();
                refreshAll();
                
            } catch(err) {
                document.getElementById(`upload-${uploadId}`).innerHTML += `
                    <span class="text-red-400 text-xs">上传失败: ${err.message}</span>
                    <button onclick="this.parentElement.remove()" class="px-3 py-1.5 bg-gray-700 rounded-lg text-xs">移除</button>
                `;
            }
            
            event.target.value = '';
        }

        function readExcel(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                        resolve(jsonData);
                    } catch(err) {
                        reject(err);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function processStoreData(rows) {
            // Expected: 店铺名称, ABC级分类 (optional: 城市/区域)
            const headers = rows[0];
            const nameIdx = headers.findIndex(h => h && h.includes('店铺'));
            const abcIdx = headers.findIndex(h => h && h.includes('ABC'));
            const cityIdx = headers.findIndex(h => h && (h.includes('城市') || h.includes('区域')));
            
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row[nameIdx]) continue;
                DataStore.storeData.push({
                    name: String(row[nameIdx]).trim(),
                    abc: row[abcIdx] ? String(row[abcIdx]).trim().toUpperCase() : 'B',
                    city: cityIdx >= 0 ? String(row[cityIdx] || '').trim() : ''
                });
            }
            // Deduplicate
            const seen = new Set();
            DataStore.storeData = DataStore.storeData.filter(s => {
                if (seen.has(s.name)) return false;
                seen.add(s.name);
                return true;
            });
        }

        function processSummaryData(rows, filename) {
            const headers = rows[0];
            const findIdx = (keywords) => {
                for (let i = 0; i < headers.length; i++) {
                    const h = String(headers[i] || '');
                    if (keywords.some(k => h.includes(k))) return i;
                }
                return -1;
            };
            
            const ymIdx = findIdx(['年份月份', '年月', '月份']);
            const storeIdx = findIdx(['店铺名称', '店铺']);
            const netQtyIdx = findIdx(['净销量', '销量']);
            const netAmtIdx = findIdx(['净销售额', '销售额']);
            const inIdx = findIdx(['调入']);
            const outIdx = findIdx(['调出']);
            const endIdx = findIdx(['期末库存', '期末']);
            const beginIdx = findIdx(['期初']);
            const sellIdx = findIdx(['售罄率']);
            const ratioIdx = findIdx(['库销比']);
            
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row[storeIdx]) continue;
                DataStore.summaryData.push({
                    yearMonth: String(row[ymIdx] || '').trim(),
                    storeName: String(row[storeIdx]).trim(),
                    netQty: parseFloat(row[netQtyIdx]) || 0,
                    netAmount: parseFloat(row[netAmtIdx]) || 0,
                    transferIn: parseFloat(row[inIdx]) || 0,
                    transferOut: parseFloat(row[outIdx]) || 0,
                    endStock: parseFloat(row[endIdx]) || 0,
                    beginStock: parseFloat(row[beginIdx]) || 0,
                    sellRate: parseFloat(row[sellIdx]) || 0,
                    stockRatio: parseFloat(row[ratioIdx]) || 0,
                    sourceFile: filename
                });
            }
        }

        function processRetailData(rows, filename) {
            const headers = rows[0];
            const findIdx = (keywords) => {
                for (let i = 0; i < headers.length; i++) {
                    const h = String(headers[i] || '');
                    if (keywords.some(k => h.includes(k))) return i;
                }
                return -1;
            };
            
            const dateIdx = findIdx(['单据日期', '日期']);
            const storeIdx = findIdx(['店铺名称', '店铺']);
            const styleIdx = findIdx(['商品款号', '款号']);
            const nameIdx = findIdx(['商品名称', '名称']);
            const colorIdx = findIdx(['颜色']);
            const sizeIdx = findIdx(['尺码']);
            const qtyIdx = findIdx(['数量']);
            const amtIdx = findIdx(['金额']);
            const priceIdx = findIdx(['单价']);
            
            let count = 0;
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row[storeIdx] || !row[styleIdx]) continue;
                DataStore.retailData.push({
                    date: String(row[dateIdx] || '').trim(),
                    store: String(row[storeIdx]).trim(),
                    styleNo: String(row[styleIdx]).trim(),
                    name: String(row[nameIdx] || '').trim(),
                    color: String(row[colorIdx] || '').trim(),
                    size: String(row[sizeIdx] || '').trim(),
                    qty: parseFloat(row[qtyIdx]) || 0,
                    amount: parseFloat(row[amtIdx]) || 0,
                    price: parseFloat(row[priceIdx]) || 0,
                    sourceFile: filename
                });
                count++;
            }
            return count;
        }

        function deleteUpload(type, id) {
            const el = document.getElementById(`upload-${id}`);
            if (el) el.remove();
            
            // Remove from uploads record
            DataStore.uploads[type] = DataStore.uploads[type].filter(u => u.id !== id);
            
            // Note: Actual data removal would require tracking which rows came from which file
            // For simplicity, we rebuild from remaining uploads or clear all
            // In production, you'd want to track source file per row
            
            DataStore.save();
        }

        function clearAllData() {
            if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) return;
            DataStore.storeData = [];
            DataStore.summaryData = [];
            DataStore.retailData = [];
            DataStore.uploads = { store: [], summary: [], retail: [] };
            localStorage.removeItem('retail_analyzer_data');
            ['store-uploads', 'summary-uploads', 'retail-uploads'].forEach(id => {
                document.getElementById(id).innerHTML = '';
            });
            refreshAll();
        }

        // ========== DIAGNOSIS LOGIC ==========
        function getStoreABC(name) {
            const store = DataStore.storeData.find(s => s.name === name);
            return store ? store.abc : 'B';
        }

        function getPeerAverage(yearMonth, abc, metric) {
            const peers = DataStore.summaryData.filter(d => d.yearMonth === yearMonth && getStoreABC(d.storeName) === abc);
            if (peers.length === 0) return 0;
            const sum = peers.reduce((a, b) => a + b[metric], 0);
            return sum / peers.length;
        }

        function getStatusLight(value, peerAvg, metric) {
            // For sellRate: higher is better
            // For stockRatio: lower is better (generally)
            const diff = metric === 'stockRatio' ? (peerAvg - value) / peerAvg : (value - peerAvg) / peerAvg;
            
            if (diff > 0.1) return { color: 'green', label: '绿灯', class: 'light-green' };
            if (diff > -0.2) return { color: 'yellow', label: '黄灯', class: 'light-yellow' };
            return { color: 'red', label: '红灯', class: 'light-red' };
        }

        function updateDiagnosis() {
            const timeFilter = document.getElementById('diag-time-filter').value;
            const storeFilter = document.getElementById('diag-store-filter').value;
            const abcFilter = document.getElementById('diag-abc-filter').value;
            const statusFilter = document.getElementById('diag-status-filter').value;
            
            let data = DataStore.summaryData;
            if (timeFilter) data = data.filter(d => d.yearMonth === timeFilter);
            if (storeFilter) data = data.filter(d => d.storeName === storeFilter);
            if (abcFilter) data = data.filter(d => getStoreABC(d.storeName) === abcFilter);
            
            const container = document.getElementById('diagnosis-cards');
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="glass-card p-8 text-center text-gray-500 col-span-full">
                        <p>暂无数据，请先导入月度汇总表</p>
                    </div>
                `;
                return;
            }
            
            // Group by store if showing all
            const stores = [...new Set(data.map(d => d.storeName))];
            
            let html = '';
            stores.forEach(store => {
                const storeData = data.filter(d => d.storeName === store);
                const latest = storeData[storeData.length - 1];
                const abc = getStoreABC(store);
                const peerSell = getPeerAverage(latest.yearMonth, abc, 'sellRate');
                const peerStock = getPeerAverage(latest.yearMonth, abc, 'stockRatio');
                
                const sellStatus = getStatusLight(latest.sellRate, peerSell, 'sellRate');
                const stockStatus = getStatusLight(latest.stockRatio, peerStock, 'stockRatio');
                
                // Overall status (worst of the two)
                let overallStatus = sellStatus;
                if (stockStatus.color === 'red' || (stockStatus.color === 'yellow' && sellStatus.color === 'green')) {
                    overallStatus = stockStatus;
                }
                
                if (statusFilter && overallStatus.color !== statusFilter) return;
                
                // Calculate MoM and YoY
                const prevMonth = getPrevPeriod(latest.yearMonth, 1);
                const prevYear = getPrevPeriod(latest.yearMonth, 12);
                const prevMonthData = DataStore.summaryData.find(d => d.storeName === store && d.yearMonth === prevMonth);
                const prevYearData = DataStore.summaryData.find(d => d.storeName === store && d.yearMonth === prevYear);
                
                const momSell = prevMonthData ? ((latest.sellRate - prevMonthData.sellRate) / prevMonthData.sellRate * 100).toFixed(1) : '--';
                const yoySell = prevYearData ? ((latest.sellRate - prevYearData.sellRate) / prevYearData.sellRate * 100).toFixed(1) : '--';
                
                html += `
                    <div class="glass-card p-6 hover:scale-[1.02] transition-transform cursor-pointer" onclick="showReport('${store}', '${latest.yearMonth}')">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-lg font-bold">${store}</h3>
                                <span class="inline-block mt-1 px-2 py-0.5 bg-${abc === 'A' ? 'purple' : abc === 'B' ? 'blue' : 'gray'}-600/30 text-${abc === 'A' ? 'purple' : abc === 'B' ? 'blue' : 'gray'}-300 rounded text-xs">
                                    ${abc}级店铺
                                </span>
                            </div>
                            <div class="w-4 h-4 rounded-full ${overallStatus.class}"></div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="bg-white/5 rounded-lg p-3">
                                <p class="text-xs text-gray-400 mb-1">售罄率</p>
                                <p class="text-xl font-bold ${sellStatus.color === 'green' ? 'text-emerald-400' : sellStatus.color === 'yellow' ? 'text-amber-400' : 'text-red-400'}">
                                    ${(latest.sellRate * 100).toFixed(1)}%
                                </p>
                                <p class="text-xs text-gray-500 mt-1">同级平均 ${(peerSell * 100).toFixed(1)}%</p>
                            </div>
                            <div class="bg-white/5 rounded-lg p-3">
                                <p class="text-xs text-gray-400 mb-1">库销比</p>
                                <p class="text-xl font-bold ${stockStatus.color === 'green' ? 'text-emerald-400' : stockStatus.color === 'yellow' ? 'text-amber-400' : 'text-red-400'}">
                                    ${latest.stockRatio.toFixed(2)}
                                </p>
                                <p class="text-xs text-gray-500 mt-1">同级平均 ${peerStock.toFixed(2)}</p>
                            </div>
                        </div>
                        
                        <div class="flex gap-4 text-xs text-gray-400">
                            <span>环比: <span class="${momSell > 0 ? 'text-emerald-400' : 'text-red-400'}">${momSell}%</span></span>
                            <span>同比: <span class="${yoySell > 0 ? 'text-emerald-400' : 'text-red-400'}">${yoySell}%</span></span>
                        </div>
                        
                        <div class="mt-4 pt-3 border-t border-white/5 text-xs text-gray-500">
                            ${latest.yearMonth} | 净销 ${latest.netQty}件 | ¥${latest.netAmount.toLocaleString()}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html || '<div class="glass-card p-8 text-center text-gray-500 col-span-full"><p>没有符合条件的数据</p></div>';
        }

        function getPrevPeriod(ym, monthsBack) {
            // ym format: 2024-04 or 2024-04~06
            const match = ym.match(/(\d{4})-(\d{2})/);
            if (!match) return '';
            let year = parseInt(match[1]);
            let month = parseInt(match[2]) - monthsBack;
            while (month <= 0) { month += 12; year--; }
            return `${year}-${String(month).padStart(2, '0')}`;
        }

        // ========== RETAIL ANALYSIS ==========
        let selectedStyle = null;
        let selectedColor = null;

        function updateRetailAnalysis() {
            const start = document.getElementById('retail-start').value;
            const end = document.getElementById('retail-end').value;
            const storeFilter = document.getElementById('retail-store-filter').value;
            const abcFilter = document.getElementById('retail-abc-filter').value;
            
            let data = DataStore.retailData;
            
            // Date filter
            if (start) data = data.filter(d => d.date >= start);
            if (end) data = data.filter(d => d.date <= end);
            
            // Store filter
            if (storeFilter) data = data.filter(d => d.store === storeFilter);
            if (abcFilter) {
                const abcStores = DataStore.storeData.filter(s => s.abc === abcFilter).map(s => s.name);
                data = data.filter(d => abcStores.includes(d.store));
            }
            
            document.getElementById('retail-count').textContent = data.length.toLocaleString();
            
            // Update rankings
            updateStyleRanking(data);
            updateColorRanking(data);
            updateSizeRanking(data);
            updateSlowMovers(data);
            updateTransferSuggestions(data);
            updateRetailDetail(data);
        }

        function updateStyleRanking(data) {
            const styleMap = {};
            data.forEach(d => {
                if (!styleMap[d.styleNo]) styleMap[d.styleNo] = 0;
                styleMap[d.styleNo] += d.qty;
            });
            
            const sorted = Object.entries(styleMap).sort((a, b) => b[1] - a[1]).slice(0, 10);
            const tbody = document.querySelector('#rank-style-table tbody');
            tbody.innerHTML = sorted.map((item, i) => `
                <tr class="cursor-pointer ${selectedStyle === item[0] ? 'bg-blue-600/20' : ''}" onclick="selectStyle('${item[0]}')">
                    <td><span class="rank-badge ${i < 3 ? 'rank-' + (i+1) : 'rank-other'}">${i + 1}</span></td>
                    <td class="font-medium">${item[0]}</td>
                    <td class="text-right font-bold text-emerald-400">${item[1]}</td>
                </tr>
            `).join('');
        }

        function updateColorRanking(data) {
            let filtered = data;
            if (selectedStyle) filtered = filtered.filter(d => d.styleNo === selectedStyle);
            
            const colorMap = {};
            filtered.forEach(d => {
                if (!d.color) return;
                if (!colorMap[d.color]) colorMap[d.color] = 0;
                colorMap[d.color] += d.qty;
            });
            
            const sorted = Object.entries(colorMap).sort((a, b) => b[1] - a[1]).slice(0, 10);
            const tbody = document.querySelector('#rank-color-table tbody');
            tbody.innerHTML = sorted.map((item, i) => `
                <tr class="cursor-pointer ${selectedColor === item[0] ? 'bg-blue-600/20' : ''}" onclick="selectColor('${item[0]}')">
                    <td><span class="rank-badge ${i < 3 ? 'rank-' + (i+1) : 'rank-other'}">${i + 1}</span></td>
                    <td class="font-medium">${item[0]}</td>
                    <td class="text-right font-bold text-blue-400">${item[1]}</td>
                </tr>
            `).join('');
            
            document.getElementById('selected-style-label').textContent = selectedStyle ? `(${selectedStyle})` : '';
        }

        function updateSizeRanking(data) {
            let filtered = data;
            if (selectedStyle) filtered = filtered.filter(d => d.styleNo === selectedStyle);
            if (selectedColor) filtered = filtered.filter(d => d.color === selectedColor);
            
            const sizeMap = {};
            filtered.forEach(d => {
                if (!d.size) return;
                if (!sizeMap[d.size]) sizeMap[d.size] = 0;
                sizeMap[d.size] += d.qty;
            });
            
            const sorted = Object.entries(sizeMap).sort((a, b) => b[1] - a[1]).slice(0, 10);
            const tbody = document.querySelector('#rank-size-table tbody');
            tbody.innerHTML = sorted.map((item, i) => `
                <tr>
                    <td><span class="rank-badge ${i < 3 ? 'rank-' + (i+1) : 'rank-other'}">${i + 1}</span></td>
                    <td class="font-medium">${item[0]}</td>
                    <td class="text-right font-bold text-purple-400">${item[1]}</td>
                </tr>
            `).join('');
            
            document.getElementById('selected-color-label').textContent = selectedColor ? `(${selectedColor})` : '';
        }

        function selectStyle(style) {
            selectedStyle = selectedStyle === style ? null : style;
            selectedColor = null;
            updateRetailAnalysis();
        }

        function selectColor(color) {
            selectedColor = selectedColor === color ? null : color;
            updateRetailAnalysis();
        }

        function updateSlowMovers(data) {
            // Group by style+store, calculate sell-through
            const storeStyleMap = {};
            data.forEach(d => {
                const key = `${d.store}_${d.styleNo}`;
                if (!storeStyleMap[key]) storeStyleMap[key] = { store: d.store, style: d.styleNo, qty: 0, amount: 0 };
                storeStyleMap[key].qty += d.qty;
                storeStyleMap[key].amount += d.amount;
            });
            
            const sorted = Object.values(storeStyleMap).sort((a, b) => a.qty - b.qty).slice(0, 10);
            const tbody = document.querySelector('#slow-style-table tbody');
            tbody.innerHTML = sorted.map(item => `
                <tr>
                    <td class="font-medium">${item.style}</td>
                    <td>${item.store}</td>
                    <td class="text-right">--</td>
                    <td class="text-right text-red-400">${item.qty}</td>
                    <td><span class="px-2 py-0.5 bg-red-600/20 text-red-400 rounded text-xs">滞销</span></td>
                </tr>
            `).join('');
        }

        function updateTransferSuggestions(data) {
            // Find styles that sell well in some stores but not in others
            const storeStyleSales = {};
            data.forEach(d => {
                if (!storeStyleSales[d.store]) storeStyleSales[d.store] = {};
                if (!storeStyleSales[d.store][d.styleNo]) storeStyleSales[d.store][d.styleNo] = 0;
                storeStyleSales[d.store][d.styleNo] += d.qty;
            });
            
            const suggestions = [];
            const stores = Object.keys(storeStyleSales);
            
            stores.forEach(fromStore => {
                Object.entries(storeStyleSales[fromStore]).forEach(([style, qty]) => {
                    if (qty <= 2) { // Low sales in fromStore
                        stores.forEach(toStore => {
                            if (toStore !== fromStore && storeStyleSales[toStore][style] > 10) {
                                suggestions.push({
                                    from: fromStore,
                                    to: toStore,
                                    style: style,
                                    fromQty: qty,
                                    toQty: storeStyleSales[toStore][style]
                                });
                            }
                        });
                    }
                });
            });
            
            const container = document.getElementById('transfer-suggestions');
            if (suggestions.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">暂无需调拨建议</p>';
                return;
            }
            
            container.innerHTML = suggestions.slice(0, 20).map(s => `
                <div class="flex items-center gap-3 p-3 bg-white/5 rounded-lg mb-2 text-sm">
                    <span class="text-red-400">${s.from}</span>
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                    </svg>
                    <span class="text-emerald-400">${s.to}</span>
                    <span class="flex-1 text-gray-300">${s.style}</span>
                    <span class="text-xs text-gray-500">滞销${s.fromQty} → 畅销${s.toQty}</span>
                </div>
            `).join('');
        }

        function updateRetailDetail(data) {
            const tbody = document.querySelector('#retail-detail-table tbody');
            tbody.innerHTML = data.slice(0, 100).map(d => `
                <tr>
                    <td>${d.date}</td>
                    <td>${d.store}</td>
                    <td class="font-mono text-xs">${d.styleNo}</td>
                    <td>${d.color || '-'}</td>
                    <td>${d.size || '-'}</td>
                    <td class="text-right">${d.qty}</td>
                    <td class="text-right">¥${d.amount.toFixed(2)}</td>
                </tr>
            `).join('');
        }

        // ========== REPORT GENERATION ==========
        function showReport(store, yearMonth) {
            const data = DataStore.summaryData.filter(d => d.storeName === store && d.yearMonth === yearMonth);
            if (data.length === 0) return;
            const latest = data[data.length - 1];
            const abc = getStoreABC(store);
            const peerSell = getPeerAverage(yearMonth, abc, 'sellRate');
            const peerStock = getPeerAverage(yearMonth, abc, 'stockRatio');
            
            const sellStatus = getStatusLight(latest.sellRate, peerSell, 'sellRate');
            const stockStatus = getStatusLight(latest.stockRatio, peerStock, 'stockRatio');
            
            const modal = document.getElementById('report-modal');
            const content = document.getElementById('report-content');
            
            content.innerHTML = `
                <div class="bg-white text-black p-8 rounded-xl">
                    <h1 class="text-2xl font-bold text-center mb-2">门店健康诊断报告</h1>
                    <p class="text-center text-gray-500 mb-8">反季月度/正季半月</p>
                    
                    <div class="grid grid-cols-3 gap-4 mb-8 text-sm">
                        <div><strong>店铺名称：</strong>${store}</div>
                        <div><strong>诊断月份：</strong>${yearMonth}</div>
                        <div><strong>店铺级别：</strong>${abc}级</div>
                    </div>
                    
                    <h2 class="text-lg font-bold mb-4 border-b-2 border-black pb-2">一、核心指标看板</h2>
                    <table class="w-full mb-8 text-sm border-collapse">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="border p-2 text-left">指标</th>
                                <th class="border p-2 text-right">本月值</th>
                                <th class="border p-2 text-right">同级平均</th>
                                <th class="border p-2 text-right">状态</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="border p-2">售罄率</td>
                                <td class="border p-2 text-right">${(latest.sellRate * 100).toFixed(1)}%</td>
                                <td class="border p-2 text-right">${(peerSell * 100).toFixed(1)}%</td>
                                <td class="border p-2 text-right">
                                    <span class="inline-block w-3 h-3 rounded-full ${sellStatus.class}"></span>
                                    ${sellStatus.label}
                                </td>
                            </tr>
                            <tr>
                                <td class="border p-2">库销比</td>
                                <td class="border p-2 text-right">${latest.stockRatio.toFixed(2)}</td>
                                <td class="border p-2 text-right">${peerStock.toFixed(2)}</td>
                                <td class="border p-2 text-right">
                                    <span class="inline-block w-3 h-3 rounded-full ${stockStatus.class}"></span>
                                    ${stockStatus.label}
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    
                    <h2 class="text-lg font-bold mb-4 border-b-2 border-black pb-2">二、商品深度分析</h2>
                    <p class="text-gray-500 text-sm mb-4">（基于零售明细数据自动生成）</p>
                    
                    <h2 class="text-lg font-bold mb-4 border-b-2 border-black pb-2">三、一句话诊断</h2>
                    <div class="mb-4">
                        <p class="mb-2"><strong>核心问题：</strong>________________________________________</p>
                        <p class="mb-2"><strong>改进机会：</strong>________________________________________</p>
                        <p><strong>针对性措施：</strong>________________________________________</p>
                    </div>
                    
                    <h2 class="text-lg font-bold mb-4 border-b-2 border-black pb-2">四、3条行动建议</h2>
                    <ol class="list-decimal list-inside space-y-2 text-sm">
                        <li><strong>陈列调整：</strong>________________________________________</li>
                        <li><strong>主推话术：</strong>________________________________________</li>
                        <li><strong>促销动作：</strong>________________________________________</li>
                    </ol>
                    
                    <p class="mt-8 text-xs text-gray-500">备注：下月初复查执行效果。</p>
                </div>
            `;
            
            modal.classList.remove('hidden');
        }

        function generateFullReport() {
            const timeFilter = document.getElementById('diag-time-filter').value;
            if (!timeFilter) {
                alert('请先选择月份');
                return;
            }
            // Show first store report as example
            const stores = [...new Set(DataStore.summaryData.filter(d => d.yearMonth === timeFilter).map(d => d.storeName))];
            if (stores.length > 0) showReport(stores[0], timeFilter);
        }

        function closeReport() {
            document.getElementById('report-modal').classList.add('hidden');
        }

        function printReport() {
            window.print();
        }

        function exportAllReports() {
            const timeFilter = document.getElementById('diag-time-filter').value;
            if (!timeFilter) {
                alert('请先选择月份');
                return;
            }
            
            const stores = [...new Set(DataStore.summaryData.filter(d => d.yearMonth === timeFilter).map(d => d.storeName))];
            
            // Create a workbook with multiple sheets
            const wb = XLSX.utils.book_new();
            
            stores.forEach(store => {
                const data = DataStore.summaryData.filter(d => d.storeName === store && d.yearMonth === timeFilter);
                if (data.length === 0) return;
                const latest = data[0];
                const abc = getStoreABC(store);
                const peerSell = getPeerAverage(timeFilter, abc, 'sellRate');
                const peerStock = getPeerAverage(timeFilter, abc, 'stockRatio');
                
                const wsData = [
                    ['门店健康诊断报告'],
                    ['店铺名称', store],
                    ['诊断月份', timeFilter],
                    [''],
                    ['一、核心指标看板'],
                    ['指标', '本月值', '同级平均', '状态'],
                    ['售罄率', latest.sellRate, peerSell, ''],
                    ['库销比', latest.stockRatio, peerStock, ''],
                    [''],
                    ['二、商品深度分析'],
                    ['款式', '本月销售件数', '当前库存', '售罄率', '状态'],
                    ['(数据基于零售明细自动生成)'],
                    [''],
                    ['三、行动建议'],
                    ['1. 陈列调整：'],
                    ['2. 主推话术：'],
                    ['3. 促销动作：']
                ];
                
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                XLSX.utils.book_append_sheet(wb, ws, store.substring(0, 31));
            });
            
            XLSX.writeFile(wb, `诊断报告_${timeFilter}.xlsx`);
        }

        // ========== UI HELPERS ==========
        function switchTab(tab) {
            ['diagnosis', 'retail', 'admin'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).classList.remove('tab-active');
                document.getElementById(`nav-${t}`).classList.add('text-gray-400');
            });
            
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).classList.add('tab-active');
            document.getElementById(`nav-${tab}`).classList.remove('text-gray-400');
            
            if (tab === 'diagnosis') updateDiagnosis();
            if (tab === 'retail') updateRetailAnalysis();
        }

        function refreshAll() {
            // Update filter options
            const timeSelect = document.getElementById('diag-time-filter');
            const times = [...new Set(DataStore.summaryData.map(d => d.yearMonth))].sort();
            timeSelect.innerHTML = '<option value="">请选择月份</option>' + 
                times.map(t => `<option value="${t}">${t}</option>`).join('');
            
            const storeSelect = document.getElementById('diag-store-filter');
            const stores = [...new Set(DataStore.storeData.map(s => s.name))].sort();
            storeSelect.innerHTML = '<option value="">全部店铺</option>' + 
                stores.map(s => `<option value="${s}">${s}</option>`).join('');
            
            const retailStoreSelect = document.getElementById('retail-store-filter');
            retailStoreSelect.innerHTML = '<option value="">全部店铺</option>' + 
                stores.map(s => `<option value="${s}">${s}</option>`).join('');
            
            updateDiagnosis();
        }

        // ========== INIT ==========
        window.addEventListener('DOMContentLoaded', () => {
            DataStore.load();
            refreshAll();
            
            // Set default date range for retail
            const today = new Date();
            const lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
            document.getElementById('retail-end').value = today.toISOString().split('T')[0];
            document.getElementById('retail-start').value = lastMonth.toISOString().split('T')[0];
        });
    </script>
</body>
</html>
